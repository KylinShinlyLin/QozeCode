name: ✨ Feature Request
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请详细描述你的需求，帮助我们理解其价值和实现方向。

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      description: 该功能属于哪个模块？
      options:
        - Agent 核心逻辑（推理、状态流转、Prompt）
        - 工具系统（新增/改进工具）
        - 模型支持（新增模型适配）
        - TUI / UI 界面
        - 子代理系统（Subagent）
        - 计划模式（Plan Mode）
        - 技能系统（Skills）
        - 配置 / 安装
        - 文档 / 示例
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你想要的功能
      placeholder: |
        例如：希望能支持自定义的系统提示词热重载，修改 prompt 后无需重启 qoze...
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 描述这个功能在什么场景下有用，解决什么问题
      placeholder: |
        例如：在调试 Agent 行为时，我经常需要调整 system prompt 来观察效果。
        目前每次修改后都要重启程序，非常影响效率...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 如果你已有具体的实现思路，请描述
      placeholder: |
        例如：
        - 添加一个 `/reload-prompt` 命令
        - 监听 `.qoze/rules/` 下文件的变更
        - 或者提供一个配置项 `auto_reload_prompt = true`
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式或临时 workaround？
      placeholder: |
        例如：目前我只能手动重启程序，或者用 `/clear` 后重新加载。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他有助于理解该需求的上下文
      placeholder: |
        可以附上参考链接、类似项目的实现、设计草图等...
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: 贡献意愿
      description: 你是否愿意参与该功能的实现？
      options:
        - label: 我愿意提交 PR 实现这个功能
          required: false
        - label: 我可以协助测试和验证
          required: false
