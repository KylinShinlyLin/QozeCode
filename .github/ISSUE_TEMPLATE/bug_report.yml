name: 🐛 Bug Report
description: 报告一个 Bug 或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 Bug 报告！为了帮助我们快速定位和修复问题，请尽可能详细地填写以下信息。

  - type: dropdown
    id: issue_type
    attributes:
      label: 问题类型
      description: 请选择最符合的问题分类
      options:
        - Agent 行为异常（推理错误、循环、不响应等）
        - 工具执行失败（命令、文件、浏览器、搜索等）
        - TUI / UI 显示问题
        - 模型调用失败（API 错误、Token 超限等）
        - 子代理（Subagent）相关问题
        - 计划模式（Plan Mode）相关问题
        - 技能系统（Skills）相关问题
        - 安装 / 启动问题
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述你遇到的 Bug
      placeholder: |
        例如：在使用 deepseek-chat 模型时，Agent 进入无限循环，不断调用 search 工具...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供能复现该问题的具体步骤
      placeholder: |
        1. 启动 qoze，选择模型 'xxx'
        2. 输入指令 '...'
        3. Agent 开始执行...
        4. 出现错误 / 异常行为
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 vs 实际行为
      description: 描述你期望发生什么，以及实际发生了什么
      placeholder: |
        - 期望：Agent 应该执行一次搜索后总结结果
        - 实际：Agent 重复搜索了 10 次，没有进入下一步
    validations:
      required: true

  - type: dropdown
    id: model
    attributes:
      label: 使用的模型
      description: 出现问题时使用的 LLM 模型
      options:
        - deepseek-chat
        - deepseek-reasoner
        - gpt-4o
        - gpt-4o-mini
        - o1 / o3
        - claude-sonnet / opus
        - gemini
        - grok
        - 智谱 GLM
        - 阿里 Qwen
        - 其他 / 多个模型
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请提供你的运行环境
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04 / Windows 11
        - Python 版本: 3.11.4
        - QozeCode 版本: 最新 main 分支 / v1.x.x
        - 安装方式: pip install / git clone + install.sh
      render: text
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 错误信息
      description: |
        如果有错误输出，请粘贴相关日志。可以查看以下日志文件：
        - `.qoze/debug.log` — 运行时调试日志
        - `.qoze/stream_debug.log` — 流式事件日志
        - 终端中的异常堆栈
      placeholder: |
        请粘贴关键日志或错误堆栈...
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图（如有）
      description: 如果问题涉及 UI 显示异常，请上传截图
      placeholder: 拖拽图片到此处或点击上传
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 自查清单
      description: 提交前请确认以下事项
      options:
        - label: 我已经搜索过现有 issue，确认该问题未被报告过
          required: true
        - label: 我使用的是最新代码（已执行 `git pull`）
          required: true
        - label: 我已检查 `.qoze/debug.log` 中的相关日志
          required: false
